  <!--
  ════════════════════════════════════════════════
  COLOR DODGE — CHAPTER TEMPLATE

  HOW TO USE:
  1. Duplicate this file and rename it, e.g. ch01.html
  2. Fill in the 4 config variables in the <script> below
  3. Replace the placeholder <div class="ph"> blocks
     with your actual <img> tags
  4. Upload to Neocities alongside your other files

  That's it! No CSS to touch, no style.css needed.
  ════════════════════════════════════════════════
  -->

  <title>Loading... · Color Dodge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #d45c38;
      --mono: 'Space Mono', monospace;
    }

    body { background: #111; color: #ccc; font-family: var(--mono); }

    /* ── TOP BAR ── */
    .bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 48px;
      background: rgba(17,17,17,0.97);
      border-bottom: 1px solid #222;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      gap: 1rem;
    }

    .bar-left  { display: flex; align-items: center; gap: 0.9rem; min-width: 0; }
    .bar-right { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }

    .bar-logo {
      font-size: 0.8rem; color: #777; text-decoration: none; white-space: nowrap;
    }
    .bar-logo em { font-style: italic; color: var(--accent); }

    .bar-info {
      font-size: 0.68rem; color: #444;
      border-left: 1px solid #222; padding-left: 0.85rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-info strong { color: #aaa; font-weight: 400; }

    /* nav buttons */
    .btn {
      font-family: var(--mono);
      font-size: 0.68rem; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 0.28rem 0.85rem;
      border: 1px solid #2a2a2a; border-radius: 999px;
      background: transparent; color: #666;
      text-decoration: none; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .ch-select {
      font-family: var(--mono); font-size: 0.68rem;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #aaa; padding: 0.28rem 0.6rem;
      border-radius: 999px; cursor: pointer;
    }

    /* ── READING PROGRESS ── */
    .progress {
      position: fixed; top: 48px; left: 0;
      height: 2px; background: var(--accent);
      width: 0%; z-index: 99;
      transition: width 0.08s linear;
    }

    /* ── PAGES ── */
    .pages {
      padding-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* each page image */
    .page {
      width: 100%;
      max-width: 800px;
      line-height: 0;
      /* tiny gap between pages */
      border-bottom: 2px solid #111;
    }

    .pages img {
  display: block;
  width: 100%;
  max-width: 800px;
  height: auto;
  border-bottom: 3px solid #111;
  /* add these two: */
  box-sizing: border-box;
  object-fit: contain;
  }

    /* ── PLACEHOLDER (delete once you have real images) ── */
    .ph {
      width: 100%; aspect-ratio: 3/4.3;
      background: #181818;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem;
    }

    .ph-n    { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #2a2a2a; }
    .ph-hint { font-size: 0.65rem; color: #222; text-align: center; max-width: 28ch; line-height: 1.6; }

    /* ── END OF CHAPTER ── */
    .end {
      width: 100%; max-width: 800px;
      padding: 3rem 2rem;
      text-align: center;
      border-top: 1px solid #1e1e1e;
    }

    .end-label {
      font-size: 0.65rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: #333;
      margin-bottom: 1.4rem;
    }

    .end-btns {
      display: flex; gap: 0.6rem;
      justify-content: center; flex-wrap: wrap;
    }

    .end-btn {
      font-family: var(--mono); font-size: 0.7rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0.55rem 1.4rem;
      border: 1px solid #2a2a2a; border-radius: 999px;
      color: #666; text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .end-btn:hover { border-color: var(--accent); color: var(--accent); }

    .end-btn.primary {
      background: var(--accent); border-color: var(--accent); color: white;
    }

    .end-btn.primary:hover { background: #bf4f30; border-color: #bf4f30; }

    @media (max-width: 540px) {
      .bar-info  { display: none; }
      .ch-select { display: none; }
    }
  </style>
</head>

<!-- ── WIRING (don't edit) ── -->
<script>
  // build chapter filename from number
  function chFile(n) { return 'ch' + n + '.html'; }

  // set up bar
  document.getElementById('bar-info').innerHTML =
    '<strong>' + CONFIG.seriesTitle + '</strong> &mdash; ch.' + CONFIG.thisChapter;
  document.title = CONFIG.seriesTitle + ' ch.' + CONFIG.thisChapter + ' · Color Dodge';

  // back button
  document.getElementById('btn-back').href  = CONFIG.projectPage;
  document.getElementById('end-back').href  = CONFIG.projectPage;

  // prev
  const prevHref = CONFIG.prevChapter ? chFile(CONFIG.prevChapter) : CONFIG.projectPage;
  document.getElementById('btn-prev').href  = prevHref;
  document.getElementById('end-prev').href  = prevHref;
  if (!CONFIG.prevChapter) {
    document.getElementById('btn-prev').style.opacity = '0.35';
    document.getElementById('end-prev').style.opacity = '0.35';
  }

  // next
  const nextHref = CONFIG.nextChapter ? chFile(CONFIG.nextChapter) : CONFIG.projectPage;
  document.getElementById('btn-next').href  = nextHref;
  document.getElementById('end-next').href  = nextHref;
  if (!CONFIG.nextChapter) {
    document.getElementById('btn-next').style.opacity = '0.35';
    document.getElementById('end-next').style.opacity = '0.35';
    document.getElementById('end-next').textContent = 'no next chapter yet';
  }

  // chapter dropdown
  const sel = document.getElementById('ch-select');
  CONFIG.allChapters.slice().reverse().forEach(n => {
    const o = document.createElement('option');
    o.value = n;
    o.textContent = 'ch.' + n;
    if (n === CONFIG.thisChapter) o.selected = true;
    sel.appendChild(o);
  });

  function jumpTo(n) {
    window.location.href = chFile(n);
  }

  // reading progress bar
  window.addEventListener('scroll', () => {
    const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
    document.getElementById('progress').style.width = Math.min(pct, 100).toFixed(1) + '%';
  });
</script>
