<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... · Color Dodge</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #b02323; --mono: 'Space Mono', monospace; }
    body { background: #111; color: #ccc; font-family: var(--mono); }

    .bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 48px; background: rgba(17,17,17,0.97);
      border-bottom: 1px solid #222;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem; gap: 1rem;
    }
    .bar-left  { display: flex; align-items: center; gap: 0.9rem; min-width: 0; }
    .bar-right { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .bar-logo  { font-size: 0.8rem; color: #777; text-decoration: none; white-space: nowrap; }
    .bar-logo em { font-style: italic; color: var(--accent); }
    .bar-info  { font-size: 0.68rem; color: #555; border-left: 1px solid #222; padding-left: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-info strong { color: #aaa; font-weight: 400; }
    .btn {
      font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.04em;
      text-transform: uppercase; padding: 0.28rem 0.85rem;
      border: 1px solid #2a2a2a; border-radius: 5px;
      background: transparent; color: #666;
      text-decoration: none; cursor: pointer;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .ch-select {
      font-family: var(--mono); font-size: 0.68rem;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #aaa; padding: 0.28rem 0.6rem; border-radius: 5px; cursor: pointer;
    }

    /* ── PDF VIEWER ── */
    .viewer-wrap {
      padding-top: 48px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .viewer-frame {
      width: 100%;
      max-width: 900px;
      height: calc(100vh - 48px);
      border: none;
      display: block;
      background: #1a1a1a;
    }

    /* loading message shown before iframe loads */
    .viewer-loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      text-align: center;
    }

    /* ── END NAV (below the pdf) ── */
    .end {
      width: 100%; max-width: 900px;
      padding: 2rem; text-align: center;
      border-top: 1px solid #1e1e1e;
      margin: 0 auto;
    }
    .end-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #333; margin-bottom: 1.4rem; }
    .end-btns  { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
    .end-btn {
      font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 0.55rem 1.4rem;
      border: 1px solid #2a2a2a; border-radius: 5px;
      color: #666; text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .end-btn:hover { border-color: var(--accent); color: var(--accent); }
    .end-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .end-btn.primary:hover { background: #8a1a1a; border-color: #8a1a1a; }

    @media (max-width: 540px) {
      .bar-info  { display: none; }
      .ch-select { display: none; }
      .viewer-frame { height: 85vh; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     STEP 1 — fill in your chapter info here
     ═══════════════════════════════════════════ -->
<script>
  const CONFIG = {
    seriesTitle: "First Love Remodeling Log",   // shows in top bar
    projectPage: "https://color-dodge.vercel.app/projects/firstlove.html",       // your series page filename
    thisChapter: "01",                 // this chapter number
    prevChapter: null,                 // null if first chapter, or e.g. "02"
    nextChapter: 02,                 // null if latest chapter, or e.g. "02"
    allChapters: ["01", "02", "03"],               // list every chapter you have

    // ═══════════════════════════════════════════════
    // STEP 2 — paste your Google Drive FILE ID here
    //
    // From a share link like:
    //   https://drive.google.com/file/d/1AbCdEfGhIJKLmnop/view?usp=sharing
    // the file ID is the part between /d/ and /view:
    //   1AbCdEfGhIJKLmnop
    //
    // Make sure sharing is set to "Anyone with the link" → Viewer
    // ═══════════════════════════════════════════════
    driveFileId: "PASTE_YOUR_FILE_ID_HERE",
  };
</script>

<!-- top bar (don't touch) -->
<div class="bar">
  <div class="bar-left">
    <a href="index.html" class="bar-logo">Color <em>Dodge</em></a>
    <span class="bar-info" id="bar-info">loading...</span>
  </div>
  <div class="bar-right">
    <a href="#" class="btn" id="btn-prev">← prev</a>
    <select class="ch-select" id="ch-select" onchange="jumpTo(this.value)"></select>
    <a href="#" class="btn" id="btn-next">next →</a>
    <a href="#" class="btn" id="btn-back">project</a>
  </div>
</div>

<!-- PDF VIEWER -->
<div class="viewer-wrap">
  <iframe
    class="viewer-frame"
    id="pdf-frame"
    src=""
    allow="autoplay"
    loading="lazy">
  </iframe>
</div>

<!-- end of chapter nav -->
<div class="end">
  <p class="end-label">end of chapter</p>
  <div class="end-btns">
    <a href="#" class="end-btn" id="end-prev">← prev chapter</a>
    <a href="#" class="end-btn" id="end-back">chapter list</a>
    <a href="#" class="end-btn primary" id="end-next">next chapter →</a>
  </div>
</div>

<!-- wiring (don't touch) -->
<script>
  function chFile(n) { return 'ch' + n + '.html'; }

  document.getElementById('bar-info').innerHTML = '<strong>' + CONFIG.seriesTitle + '</strong> &mdash; ch.' + CONFIG.thisChapter;
  document.title = CONFIG.seriesTitle + ' ch.' + CONFIG.thisChapter + ' · Color Dodge';

  // load the PDF via Drive preview embed
  document.getElementById('pdf-frame').src =
    'https://drive.google.com/file/d/' + CONFIG.driveFileId + '/preview';

  document.getElementById('btn-back').href = CONFIG.projectPage;
  document.getElementById('end-back').href = CONFIG.projectPage;

  const prevHref = CONFIG.prevChapter ? chFile(CONFIG.prevChapter) : CONFIG.projectPage;
  document.getElementById('btn-prev').href = prevHref;
  document.getElementById('end-prev').href = prevHref;
  if (!CONFIG.prevChapter) {
    document.getElementById('btn-prev').style.opacity = '0.35';
    document.getElementById('end-prev').style.opacity = '0.35';
  }

  const nextHref = CONFIG.nextChapter ? chFile(CONFIG.nextChapter) : CONFIG.projectPage;
  document.getElementById('btn-next').href = nextHref;
  document.getElementById('end-next').href = nextHref;
  if (!CONFIG.nextChapter) {
    document.getElementById('btn-next').style.opacity = '0.35';
    document.getElementById('end-next').textContent = 'no next chapter yet';
  }

  const sel = document.getElementById('ch-select');
  CONFIG.allChapters.slice().reverse().forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = 'ch.' + n;
    if (n === CONFIG.thisChapter) o.selected = true;
    sel.appendChild(o);
  });

  function jumpTo(n) { window.location.href = chFile(n); }
</script>

</body>
</html>
